<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Originaid — Sign In</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root{
    --navy:#14213D; --navy-deep:#0D1729; --white:#FAFAF7; --ink:#0B0D12;
    --citation-red:#E63B2E; --gold:#D4A017; --line:rgba(11,13,18,0.12);
  }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--white); color:var(--ink); font-family:'Inter',sans-serif; min-height:100vh; }
  .wrap{ max-width:420px; margin: 0 auto; padding: 60px 24px; }
  .brand{ font-family:'Bebas Neue',sans-serif; font-size:44px; letter-spacing:0.02em; text-align:center;
    -webkit-text-stroke:0.7px currentColor; margin-bottom:6px; }
  .brand-sub{ text-align:center; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.1em;
    text-transform:uppercase; color:#5a5648; margin-bottom:40px; }

  .card{ background: var(--navy-deep); color: var(--white); border-radius:20px; padding:36px 32px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.4); }

  .tabs{ display:flex; gap:4px; margin-bottom:24px; background:rgba(250,250,247,0.08); border-radius:10px; padding:4px; }
  .tab{ flex:1; text-align:center; padding:10px; border-radius:8px; cursor:pointer; font-size:13.5px; font-weight:600;
    color:rgba(250,250,247,0.6); transition:all 0.15s; }
  .tab.active{ background: var(--citation-red); color:var(--white); }

  .panel{ display:none; }
  .panel.active{ display:block; }

  label{ display:block; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.06em;
    text-transform:uppercase; color:#B8860B; margin-bottom:8px; }
  input{
    width:100%; padding:12px 14px; border-radius:8px; border:1px solid rgba(250,250,247,0.2);
    background:rgba(250,250,247,0.06); color:var(--white); font-size:14px; margin-bottom:16px;
    font-family:'Inter',sans-serif;
  }
  input::placeholder{ color:rgba(250,250,247,0.35); }
  input:focus{ outline:none; border-color:var(--gold); }

  .btn{
    width:100%; padding:13px; border-radius:8px; border:none; background:var(--citation-red);
    color:var(--white); font-weight:700; font-size:14.5px; cursor:pointer; font-family:'Inter',sans-serif;
  }
  .btn:hover{ opacity:0.92; }
  .btn:disabled{ opacity:0.5; cursor:not-allowed; }

  .link-btn{
    background:none; border:none; color: var(--gold); font-size:13px; cursor:pointer; margin-top:12px;
    text-decoration:underline; font-family:'Inter',sans-serif; display:block; text-align:center; width:100%;
  }

  .msg{ font-size:13px; margin-top:16px; padding:12px 14px; border-radius:8px; display:none; }
  .msg.success{ background:rgba(63,163,94,0.15); color:#8fd6a5; display:block; }
  .msg.error{ background:rgba(230,59,46,0.15); color:#ff9d92; display:block; }

  footer{ text-align:center; margin-top:24px; font-size:12.5px; color:#8a8267; }
  footer a{ color:#B8860B; text-decoration:none; }
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">ORIGINAID</div>
  <div class="brand-sub">FTC disclosure compliance</div>

  <div class="card">
    <div class="tabs">
      <div class="tab active" data-tab="magic">Magic Link</div>
      <div class="tab" data-tab="password">Email &amp; Password</div>
    </div>

    <!-- MAGIC LINK -->
    <div class="panel active" id="panel-magic">
      <label for="magic-email">Email</label>
      <input type="email" id="magic-email" placeholder="you@yourbrand.com">
      <button class="btn" id="magic-submit">Send sign-in link</button>
      <div class="msg" id="magic-msg"></div>
    </div>

    <!-- EMAIL + PASSWORD -->
    <div class="panel" id="panel-password">
      <label for="pw-email">Email</label>
      <input type="email" id="pw-email" placeholder="you@yourbrand.com">
      <label for="pw-password">Password</label>
      <input type="password" id="pw-password" placeholder="••••••••">
      <button class="btn" id="pw-signin">Sign in</button>
      <button class="link-btn" id="pw-signup">Don't have an account? Create one</button>
      <div class="msg" id="pw-msg"></div>
    </div>
  </div>

  <footer>
    <div>Originaid logs what happened. It isn't legal advice.</div>
    <div style="margin-top:4px;"><a href="index.html">Back to site</a></div>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ---------------------------------------------------------------------------
  // REQUIRED SETUP: replace these two values with your real Supabase project's
  // URL and anon (public) key — Project Settings → API in the Supabase dashboard.
  // IMPORTANT: this must be the "anon" / "public" key, NEVER the service_role key.
  // The anon key is safe to expose in client-side code; RLS (see migration_auth.sql)
  // is what actually protects each brand's data, not secrecy of this key.
  // ---------------------------------------------------------------------------
  const SUPABASE_URL = "https://svrrmessdqixhdahifiz.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2cnJtZXNzZHFpeGhkYWhpZml6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDQ1OTAsImV4cCI6MjA5MjE4MDU5MH0.LAyRSwxpvKmnvd9vGfmzAlYyIPu1EuuaDVIzzAGfG4k";

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // If already signed in, skip straight to the dashboard.
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = "dashboard.html";
  });

  // ---- Tab switching ----
  document.querySelectorAll(".tab").forEach((tab) => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById(`panel-${tab.dataset.tab}`).classList.add("active");
    });
  });

  function showMsg(el, text, type) {
    el.textContent = text;
    el.className = `msg ${type}`;
  }

  // Translates Supabase's raw error messages into something a first-time user can
  // actually act on, rather than technical wording. Falls back to the original
  // message for anything we don't specifically recognize.
  function friendlyError(error) {
    const msg = error.message.toLowerCase();
    if (msg.includes("rate limit") || msg.includes("too many requests")) {
      return "You've requested too many sign-in emails in a short time. Wait about 15-20 minutes and try again — if it still doesn't work after that, reach out to support.";
    }
    if (msg.includes("email not confirmed")) {
      return "This email hasn't been confirmed yet. Check your inbox (and spam folder) for the confirmation email, or use Magic Link instead.";
    }
    if (msg.includes("invalid login credentials")) {
      return "That email and password combination doesn't match an account. If you haven't signed up yet, use \"Create one\" below.";
    }
    return error.message;
  }

  // ---- Magic link ----
  document.getElementById("magic-submit").addEventListener("click", async () => {
    const email = document.getElementById("magic-email").value.trim();
    const msg = document.getElementById("magic-msg");
    if (!email) return showMsg(msg, "Enter your email first.", "error");

    const btn = document.getElementById("magic-submit");
    btn.disabled = true;
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.origin + window.location.pathname.replace("auth.html", "dashboard.html") },
    });
    btn.disabled = false;

    if (error) showMsg(msg, friendlyError(error), "error");
    else showMsg(msg, "Check your email for a sign-in link.", "success");
  });

  // ---- Email + password: sign in ----
  document.getElementById("pw-signin").addEventListener("click", async () => {
    const email = document.getElementById("pw-email").value.trim();
    const password = document.getElementById("pw-password").value;
    const msg = document.getElementById("pw-msg");
    if (!email || !password) return showMsg(msg, "Enter both email and password.", "error");

    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) showMsg(msg, friendlyError(error), "error");
    else window.location.href = "dashboard.html";
  });

  // ---- Email + password: sign up ----
  document.getElementById("pw-signup").addEventListener("click", async () => {
    const email = document.getElementById("pw-email").value.trim();
    const password = document.getElementById("pw-password").value;
    const msg = document.getElementById("pw-msg");
    if (!email || !password) return showMsg(msg, "Enter both email and password.", "error");
    if (password.length < 6) return showMsg(msg, "Password needs to be at least 6 characters.", "error");

    const { error } = await sb.auth.signUp({ email, password });
    if (error) showMsg(msg, friendlyError(error), "error");
    else showMsg(msg, "Account created. Check your email to confirm, then sign in.", "success");
  });
</script>

</body>
</html>
